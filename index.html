<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dragon ball z</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: black; }
    #v_src, #out {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1);
    }
    #out { z-index: 2; pointer-events: none; }
    .darkness {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(5, 0, 10, 0.3);
      mix-blend-mode: multiply; pointer-events: none; z-index: 5;
    }
    .fx {
      position: absolute; height: auto; top: 0; left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none; display: none;
      mix-blend-mode: screen; z-index: 20;
    }
    #g { width: 1600px; }
    #v { width: 2400px; }

  
    #emoji-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }

    .emoji-pop {
      position: absolute;
      font-size: 180px;
      transform: translate(-50%, -50%) scale(0);
      animation: emojiAppear 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      filter: drop-shadow(0 0 30px rgba(255, 220, 50, 0.9)) drop-shadow(0 0 60px rgba(255, 150, 0, 0.6));
      user-select: none;
      will-change: transform, opacity;
    }

    @keyframes emojiAppear {
      0%   { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
      30%  { transform: translate(-50%, -50%) scale(1.3) rotate(8deg);  opacity: 1; }
      55%  { transform: translate(-50%, -50%) scale(0.95) rotate(-4deg); opacity: 1; }
      70%  { transform: translate(-50%, -50%) scale(1.08) rotate(2deg); opacity: 1; }
      85%  { transform: translate(-50%, -50%) scale(1) rotate(0deg);    opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.1) rotate(0deg);  opacity: 0; }
    }
  </style>
</head>
<body>

  <video id="v_src" autoplay playsinline></video>
  <canvas id="out"></canvas>
  <div class="darkness"></div>

  <video id="g" class="fx" src="videos/AB.mp4" muted autoplay loop playsinline></video>
  <video id="v" class="fx" src="videos/BA.mp4" muted autoplay loop playsinline></video>

  <div id="emoji-overlay"></div>

  <script>
    const vElement = document.getElementById('v_src');
    const cElement = document.getElementById('out');
    const ctx = cElement.getContext('2d');
    const g = document.getElementById('g');
    const v = document.getElementById('v');
    const emojiOverlay = document.getElementById('emoji-overlay');

    let pwr = [0, 0];
    let wasOpen = [false, false];

   
    const THUMB_EMOJI = '🤍';

    const THUMB_COOLDOWN = 1200;
    let lastThumbTime = [0, 0];
    let wasThumb = [false, false];

    function checkOpen(pts) {
      let count = 0;
      const wrist = pts[0];
      const tips = [8, 12, 16, 20];
      const pips = [6, 10, 14, 18];
      for (let i = 0; i < tips.length; i++) {
        const tip = pts[tips[i]];
        const pip = pts[pips[i]];
        if (Math.hypot(tip.x - wrist.x, tip.y - wrist.y) > Math.hypot(pip.x - wrist.x, pip.y - wrist.y)) count++;
      }
      return count >= 3;
    }

    function checkThumbUp(pts) {
      const wrist   = pts[0];
      const thumbTip = pts[4];
      const thumbIP  = pts[3];
      const thumbMCP = pts[2];

      
      const thumbUp = thumbTip.y < thumbIP.y && thumbIP.y < thumbMCP.y;

     
      const tips = [8, 12, 16, 20];
      const pips = [6, 10, 14, 18];
      let curledCount = 0;
      for (let i = 0; i < tips.length; i++) {
        if (pts[tips[i]].y > pts[pips[i]].y) curledCount++;
      }
      const fingersCurled = curledCount >= 3;

      return thumbUp && fingersCurled;
    }

    function spawnEmoji(x, y) {
      const el = document.createElement('div');
      el.className = 'emoji-pop';
      el.textContent = THUMB_EMOJI;
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      emojiOverlay.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }

    function onResults(res) {
      cElement.width = vElement.videoWidth;
      cElement.height = vElement.videoHeight;
      ctx.save();
      ctx.clearRect(0, 0, cElement.width, cElement.height);

      let fL = false;
      let fR = false;

      g.style.display = 'none';
      v.style.display = 'none';

      if (res.multiHandLandmarks && res.multiHandedness) {
        res.multiHandLandmarks.forEach((pts, i) => {
          const label = res.multiHandedness[i].label;
          const isR = label === 'Right';
          const idx = isR ? 1 : 0;

          ctx.save();
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#ffe566';
          drawConnectors(ctx, pts, HAND_CONNECTIONS, {color: '#ffd700', lineWidth: 3});
          drawLandmarks(ctx, pts, {color: '#ffffff', lineWidth: 1, radius: 2});
          ctx.restore();

          const open = checkOpen(pts);
          pwr[idx] += open ? 0.05 : -0.15;
          pwr[idx] = Math.max(0, Math.min(1, pwr[idx]));

          if (open && !wasOpen[idx]) {
            const vid = isR ? v : g;
            vid.currentTime = 0;
            vid.play();
          }
          wasOpen[idx] = open;

          const isThumb = checkThumbUp(pts);
          const now = Date.now();
          if (isThumb && !wasThumb[idx] && (now - lastThumbTime[idx]) > THUMB_COOLDOWN) {
            lastThumbTime[idx] = now;

            
            const wrist = pts[0];
            const screenX = (1 - wrist.x) * window.innerWidth;
            const screenY = wrist.y * window.innerHeight - 120;
            spawnEmoji(screenX, screenY);
          }
          wasThumb[idx] = isThumb;
        

          const wrist = pts[0];
          const knk = pts[9];

          if (pwr[idx] > 0.01) {
            if (isR) {
              fR = true;
              const tx = (wrist.x + knk.x) / 2;
              const ty = (wrist.y + knk.y) / 2;
              v.style.left = `${(1 - tx) * window.innerWidth}px`;
              v.style.top = `${ty * window.innerHeight}px`;
              v.style.display = 'block';
              v.style.opacity = pwr[idx];
            } else {
              fL = true;
              const dx = knk.x - wrist.x;
              const dy = knk.y - wrist.y;
              const tx = knk.x + (dx * 0.8);
              const ty = knk.y + (dy * 0.8);
              g.style.left = `${(1 - tx) * window.innerWidth}px`;
              g.style.top = `${(ty * window.innerHeight) - 120}px`;
              g.style.display = 'block';
              g.style.opacity = pwr[idx];
            }
          }
        });
      }

      if (!fL) {
        pwr[0] = Math.max(0, pwr[0] - 0.15);
        if (pwr[0] > 0.01) { g.style.display = 'block'; g.style.opacity = pwr[0]; }
        wasOpen[0] = false;
      }
      if (!fR) {
        pwr[1] = Math.max(0, pwr[1] - 0.15);
        if (pwr[1] > 0.01) { v.style.display = 'block'; v.style.opacity = pwr[1]; }
        wasOpen[1] = false;
      }
      ctx.restore();
    }

    const h = new Hands({
      locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    h.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.65
    });

    h.onResults(onResults);

    const cam = new Camera(vElement, {
      onFrame: async () => { await h.send({ image: vElement }); },
      width: 1280, height: 720
    });
    cam.start();
  </script>
</body>
</html>
