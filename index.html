<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dragon ball z</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: black; }
    #v_src, #out {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1);
    }
    #out { z-index: 2; pointer-events: none; }
    .darkness {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(5, 0, 10, 0.3);
      mix-blend-mode: multiply; pointer-events: none; z-index: 5;
    }
    .fx {
      position: absolute; height: auto; top: 0; left: 0;
      transform: translate(-50%, -50%);
      pointer-events: none; display: none;
      mix-blend-mode: screen; z-index: 20;
    }
    #g { width: 1600px; }
    #v { width: 2400px; }
  </style>
</head>
<body>

  <video id="v_src" autoplay playsinline></video>
  <canvas id="out"></canvas>
  <div class="darkness"></div>

  <video id="g" class="fx" src="assets/goku.mp4" muted autoplay loop playsinline></video>
  <video id="v" class="fx" src="assets/vegeta.mp4" muted autoplay loop playsinline></video>

  <script>
    const vElement = document.getElementById('v_src');
    const cElement = document.getElementById('out');
    const ctx = cElement.getContext('2d');
    const g = document.getElementById('g');
    const v = document.getElementById('v');

    let pwr = [0, 0];
    let wasOpen = [false, false];
    let eyePositions = null;
    let laserOpacity = 0;

    function checkOpen(pts) {
      let count = 0;
      const wrist = pts[0];
      const tips = [8, 12, 16, 20];
      const pips = [6, 10, 14, 18];
      for (let i = 0; i < tips.length; i++) {
        const tip = pts[tips[i]];
        const pip = pts[pips[i]];
        if (Math.hypot(tip.x - wrist.x, tip.y - wrist.y) > Math.hypot(pip.x - wrist.x, pip.y - wrist.y)) count++;
      }
      return count >= 3;
    }

    function checkThumbUp(pts) {
      const wrist = pts[0];
      const thumbTip = pts[4];
      const thumbMcp = pts[2];
      const thumbUp = thumbTip.y < wrist.y - 0.1 &&
                      Math.hypot(thumbTip.x - wrist.x, thumbTip.y - wrist.y) >
                      Math.hypot(thumbMcp.x - wrist.x, thumbMcp.y - wrist.y);
      const tips = [8, 12, 16, 20];
      const pips = [6, 10, 14, 18];
      let folded = 0;
      for (let i = 0; i < tips.length; i++) {
        if (Math.hypot(pts[tips[i]].x - wrist.x, pts[tips[i]].y - wrist.y) 
            Math.hypot(pts[pips[i]].x - wrist.x, pts[pips[i]].y - wrist.y)) folded++;
      }
      return thumbUp && folded >= 3;
    }

    function drawLasers() {
      if (!eyePositions || laserOpacity <= 0) return;
      const W = cElement.width;
      const H = cElement.height;

      [eyePositions.left, eyePositions.right].forEach(eye => {
        // Canvas is mirrored via CSS, so x coord is already correct
        const ex = eye.x * W;
        const ey = eye.y * H;

        // Outer wide glow
        ctx.save();
        ctx.globalAlpha = laserOpacity * 0.35;
        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 18;
        ctx.shadowBlur = 40;
        ctx.shadowColor = '#ff0000';
        ctx.beginPath();
        ctx.moveTo(ex, ey);
        ctx.lineTo(W, ey);
        ctx.stroke();
        ctx.restore();

        // Mid glow
        ctx.save();
        ctx.globalAlpha = laserOpacity * 0.7;
        ctx.strokeStyle = '#ff2200';
        ctx.lineWidth = 6;
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff0000';
        ctx.beginPath();
        ctx.moveTo(ex, ey);
        ctx.lineTo(W, ey);
        ctx.stroke();
        ctx.restore();

        // Bright core
        ctx.save();
        ctx.globalAlpha = laserOpacity;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ex, ey);
        ctx.lineTo(W, ey);
        ctx.stroke();
        ctx.restore();

        // Eye origin glow dot
        ctx.save();
        ctx.globalAlpha = laserOpacity;
        const grad = ctx.createRadialGradient(ex, ey, 0, ex, ey, 12);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.3, '#ff4400');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(ex, ey, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function onFaceResults(res) {
      if (res.multiFaceLandmarks && res.multiFaceLandmarks.length > 0) {
        const lm = res.multiFaceLandmarks[0];
        // 468 = left iris, 473 = right iris (requires refineLandmarks: true)
        eyePositions = {
          left: lm[468],
          right: lm[473]
        };
      } else {
        eyePositions = null;
      }
    }

    function onResults(res) {
      cElement.width = vElement.videoWidth;
      cElement.height = vElement.videoHeight;
      ctx.save();
      ctx.clearRect(0, 0, cElement.width, cElement.height);

      let fL = false;
      let fR = false;
      let thumbDetected = false;

      g.style.display = 'none';
      v.style.display = 'none';

      if (res.multiHandLandmarks && res.multiHandedness) {
        res.multiHandLandmarks.forEach((pts, i) => {
          const label = res.multiHandedness[i].label;
          const isR = label === 'Right';
          const idx = isR ? 1 : 0;

          ctx.save();
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#ffe566';
          drawConnectors(ctx, pts, HAND_CONNECTIONS, {color: '#ffd700', lineWidth: 3});
          drawLandmarks(ctx, pts, {color: '#ffffff', lineWidth: 1, radius: 2});
          ctx.restore();

          if (checkThumbUp(pts)) thumbDetected = true;

          const open = checkOpen(pts);
          pwr[idx] += open ? 0.05 : -0.15;
          pwr[idx] = Math.max(0, Math.min(1, pwr[idx]));

          if (open && !wasOpen[idx]) {
            const vid = isR ? v : g;
            vid.currentTime = 0;
            vid.play().catch(() => {});
          }
          wasOpen[idx] = open;

          const wrist = pts[0];
          const knk = pts[9];

          if (pwr[idx] > 0.01) {
            if (isR) {
              fR = true;
              const tx = (wrist.x + knk.x) / 2;
              const ty = (wrist.y + knk.y) / 2;
              v.style.left = `${(1 - tx) * window.innerWidth}px`;
              v.style.top = `${ty * window.innerHeight}px`;
              v.style.display = 'block';
              v.style.opacity = pwr[idx];
            } else {
              fL = true;
              const dx = knk.x - wrist.x;
              const dy = knk.y - wrist.y;
              const tx = knk.x + (dx * 0.8);
              const ty = knk.y + (dy * 0.8);
              g.style.left = `${(1 - tx) * window.innerWidth}px`;
              g.style.top = `${(ty * window.innerHeight) - 120}px`;
              g.style.display = 'block';
              g.style.opacity = pwr[idx];
            }
          }
        });
      }

      laserOpacity += thumbDetected ? 0.1 : -0.12;
      laserOpacity = Math.max(0, Math.min(1, laserOpacity));
      drawLasers();

      if (!fL) {
        pwr[0] = Math.max(0, pwr[0] - 0.15);
        if (pwr[0] > 0.01) { g.style.display = 'block'; g.style.opacity = pwr[0]; }
        wasOpen[0] = false;
      }
      if (!fR) {
        pwr[1] = Math.max(0, pwr[1] - 0.15);
        if (pwr[1] > 0.01) { v.style.display = 'block'; v.style.opacity = pwr[1]; }
        wasOpen[1] = false;
      }
      ctx.restore();
    }

    const faceMesh = new FaceMesh({
      locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onFaceResults);

    const h = new Hands({
      locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    h.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.65
    });
    h.onResults(onResults);

    const cam = new Camera(vElement, {
      onFrame: async () => {
        await faceMesh.send({ image: vElement });
        await h.send({ image: vElement });
      },
      width: 1280, height: 720
    });
    cam.start();
  </script>
</body>
</html>
